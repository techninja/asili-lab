services:
  # Hybrid server: Web UI + Server-side processing
  hybrid:
    build:
      context: .
      dockerfile: Dockerfile.hybrid
    container_name: asili-hybrid
    ports:
      - '4242:80'
    volumes:
      - ./data_out:/app/data_out
      - ./server-data:/app/server-data
      - ./apps/web:/app/apps/web
      - ./apps/calc:/app/apps/calc
      - ./packages:/app/packages
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=8192 --max-semi-space-size=128
      - UV_THREADPOOL_SIZE=16
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G
    restart: unless-stopped

  # Pipeline (run via: docker compose run --rm pipeline)
  pipeline:
    build:
      context: .
      dockerfile: ./packages/pipeline/Dockerfile
    profiles: ['pipeline']
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G
    environment:
      - CACHE_DIR=/cache
      - OUTPUT_DIR=/output
      - NODE_ENV=production
      - GNOMAD_DB_PATH=${GNOMAD_DB_PATH}
    volumes:
      - ./packages/pipeline:/app/packages/pipeline
      - ./packages/core:/app/packages/core
      - /app/packages/pipeline/node_modules
      - /app/packages/core/node_modules
      - ./data_out:/output
      - ./cache:/cache
      - ${GNOMAD_DB_PATH}:${GNOMAD_DB_PATH}:ro
